<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f0e;
    --surface:  #161a18;
    --border:   #2a2f2c;
    --accent:   #00e5a0;
    --accent2:  #00b87a;
    --text:     #e8ede9;
    --muted:    #6b7a70;
    --user-bg:  #1a2420;
    --ai-bg:    #121714;
    --danger:   #e05a5a;
    --warn:     #e0a85a;
    --good:     #5adc8e;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  header h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-pill {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .status-pill span { color: var(--good); }

  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 80%;
    animation: fadein 0.2s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.65;
  }

  .ai-answer {
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }

  .ai-meta {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid;
  }

  .tag.confidence-high   { color: var(--good);   border-color: #2a5e3f; background: #0e2218; }
  .tag.confidence-medium { color: var(--warn);   border-color: #5e4a2a; background: #221c0e; }
  .tag.confidence-low    { color: var(--danger); border-color: #5e2a2a; background: #220e0e; }

  .insight-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: #0e1a14;
    border-left: 2px solid var(--accent2);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: #8ab09a;
    font-family: var(--mono);
    line-height: 1.6;
  }

  .insight-box::before {
    content: '→ insight: ';
    color: var(--accent2);
    font-weight: 500;
  }

  .json-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
    transition: color 0.15s, border-color 0.15s;
  }

  .json-toggle:hover { color: var(--accent); border-color: var(--accent2); }

  .json-raw {
    display: none;
    margin-top: 8px;
    background: #080c0a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: #6fcf97;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
    max-height: 240px;
    overflow-y: auto;
  }

  .json-raw.open { display: block; }

  .error-bubble {
    color: var(--danger);
    font-family: var(--mono);
    font-size: 13px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #question-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #question-input:focus {
    outline: none;
    border-color: var(--accent2);
  }

  #question-input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    align-self: flex-end;
  }

  #send-btn:hover   { background: #00ffb3; }
  #send-btn:active  { transform: scale(0.97); }
  #send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .welcome {
    align-self: center;
    text-align: center;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .welcome-icon {
    font-size: 32px;
    width: 64px; height: 64px;
    background: #0e1a14;
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .welcome h2 {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
  }

  .welcome p {
    font-size: 13px;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .suggestion-btn:hover { color: var(--accent); border-color: var(--accent2); }

  .api-url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    background: #090c0b;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .api-url-bar label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .api-url-bar input {
    flex: 1;
    background: none;
    border: none;
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Inventory AI</h1>
  <div class="status-pill">model: <span>mistral</span></div>
</header>

<div class="api-url-bar">
  <label>api →</label>
  <input type="text" id="api-url" value="http://localhost:8000/ask" />
</div>

<div id="chat-area">
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">📦</div>
    <h2>Inventory Assistant</h2>
    <p>Ask anything about your inventory. Running locally — no external API, no data leaves your machine.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="fillQuestion('Which item has the highest profit margin?')">highest margin?</button>
      <button class="suggestion-btn" onclick="fillQuestion('Which items need reordering soon?')">low stock alerts?</button>
      <button class="suggestion-btn" onclick="fillQuestion('What is the total inventory value?')">total value?</button>
      <button class="suggestion-btn" onclick="fillQuestion('Which supplier supplies the most items?')">top supplier?</button>
      <button class="suggestion-btn" onclick="fillQuestion('Give me a summary of all categories.')">category summary?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea
    id="question-input"
    rows="1"
    placeholder="Ask about inventory... (Enter to send, Shift+Enter for newline)"
  ></textarea>
  <button id="send-btn" onclick="sendQuestion()">Send ↗</button>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const input    = document.getElementById('question-input');
const sendBtn  = document.getElementById('send-btn');
const welcome  = document.getElementById('welcome-screen');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
  autoResize();
});

input.addEventListener('input', autoResize);

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function fillQuestion(text) {
  input.value = text;
  input.focus();
  autoResize();
}

function addUserMsg(text) {
  if (welcome) welcome.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="msg-label">you</div>
    <div class="bubble">${escHtml(text)}</div>
  `;
  chatArea.appendChild(msg);
  scrollBottom();
}

function addTypingIndicator() {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.id = 'typing';
  el.innerHTML = `
    <div class="msg-label">inventory ai</div>
    <div class="bubble">
      <div class="typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;
  chatArea.appendChild(el);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function addAIMsg(data, rawJson) {
  const conf = (data.confidence || 'medium').toLowerCase();
  const msg = document.createElement('div');
  msg.className = 'msg ai';

  const jsonId = 'json-' + Date.now();

  msg.innerHTML = `
    <div class="msg-label">inventory ai</div>
    <div class="bubble">
      <div class="ai-answer">${escHtml(data.answer || '')}</div>
      ${data.insight ? `<div class="insight-box">${escHtml(data.insight)}</div>` : ''}
      <div class="ai-meta">
        <span class="tag confidence-${conf}">confidence: ${conf}</span>
      </div>
      <button class="json-toggle" onclick="toggleJson('${jsonId}')">{ } raw json</button>
      <pre class="json-raw" id="${jsonId}">${escHtml(JSON.stringify(JSON.parse(rawJson), null, 2))}</pre>
    </div>
  `;
  chatArea.appendChild(msg);
  scrollBottom();
}

function addErrorMsg(text) {
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.innerHTML = `
    <div class="msg-label">error</div>
    <div class="bubble error-bubble">⚠ ${escHtml(text)}</div>
  `;
  chatArea.appendChild(msg);
  scrollBottom();
}

function toggleJson(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

async function sendQuestion() {
  const q = input.value.trim();
  if (!q) return;

  const apiUrl = document.getElementById('api-url').value.trim();

  input.value = '';
  autoResize();
  sendBtn.disabled = true;

  addUserMsg(q);
  addTypingIndicator();

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });

    const rawText = await res.text();
    removeTyping();

    if (!res.ok) {
      addErrorMsg(`Server returned ${res.status}: ${rawText}`);
    } else {
      const data = JSON.parse(rawText);
      addAIMsg(data, rawText);
    }
  } catch (err) {
    removeTyping();
    if (err.name === 'TypeError' && err.message.includes('fetch')) {
      addErrorMsg('Cannot reach API. Is the FastAPI server running? → uvicorn main:app --reload --port 8000');
    } else {
      addErrorMsg(err.message);
    }
  }

  sendBtn.disabled = false;
  input.focus();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}
</script>
</body>
</html>
